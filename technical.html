<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic Puzzle World</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #000;
    }

    .screen {
      min-height: 100vh;
      background-image: url("background.jpg"); /* <- your image here */
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    .title {
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 3px 6px rgba(0, 0, 0, 0.7);
      margin-top: 16px;
      margin-bottom: 32px;
      text-align: center;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 420px;
      justify-items: center;
    }

    .circle-btn {
      width: 140px;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: radial-gradient(circle at top,
          rgba(255, 255, 255, 0.25),
          rgba(0, 0, 0, 0.65));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
    }

    .circle-btn-icon {
      font-size: 35px;
      margin-bottom: 10px;
    }

    .circle-btn-label {
      font-size: 16px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    /* Optional hover effect (will show on desktop) */
    .circle-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.7);
    }

    @media (min-width: 600px) {
      .title {
        font-size: 42px;
      }

      .circle-btn {
        width: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <h1 class="title">Magic Puzzle World</h1>

    <div class="menu-grid">
      <!-- Points Join -->
      <a class="circle-btn" href="point.html">
        <div class="circle-btn-icon">○</div>
        <div class="circle-btn-label">Points Join</div>
      </a>

      <!-- Word Game -->
      <a class="circle-btn" href="word.html">
        <div class="circle-btn-icon">🅆</div>
        <div class="circle-btn-label">Word Game</div>
      </a>

      <!-- Quiz Game -->
      <a class="circle-btn" href="quiz.html">
        <div class="circle-btn-icon">?</div>
        <div class="circle-btn-label">Quiz Game</div>
      </a>

      <!-- Coding Game -->
      <a class="circle-btn" href="coding.html">
        <div class="circle-btn-icon">&lt;/&gt;</div>
        <div class="circle-btn-label">Coding Game</div>
      </a>
    </div>
  </div>
</body>
</html>
